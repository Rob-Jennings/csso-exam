<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commissioned School Security Officer Exam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#2C3E7A;--navy-h:#3D52A0;--amber:#E8A020;--amber-lt:#FBE8C0;
  --bg:#F0F3FC;--surface:#fff;--text:#1A1F36;--muted:#6B7280;--border:#DDE3F0;
  --green:#2D7A4F;--green-lt:#D1FAE5;--red:#C0392B;--red-lt:#FDECEA;
  --radius:12px;--sh:0 2px 12px rgba(44,62,122,.10);--sh-lg:0 8px 32px rgba(44,62,122,.15);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.hdr{background:var(--navy);color:#fff;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:'DM Serif Display',serif;font-size:1.15rem;letter-spacing:-.3px;line-height:1.25}
.logo span{color:var(--amber)}
.wrap{max-width:720px;margin:0 auto;padding:18px 16px}
.wrap-wide{max-width:900px;margin:0 auto;padding:18px 16px}
.nav-back{padding:10px 16px 0;max-width:720px;margin:0 auto}
.nav-back-w{padding:10px 16px 0;max-width:900px;margin:0 auto}
.nav-back button,.nav-back-w button{background:none;border:none;color:var(--navy);cursor:pointer;font-size:.85rem;font-weight:600;font-family:'Inter',sans-serif}
.nav-back button:hover,.nav-back-w button:hover{text-decoration:underline}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--sh);padding:26px 30px}
@media(max-width:480px){.card{padding:18px 14px}}
h1{font-family:'DM Serif Display',serif;font-size:1.75rem;line-height:1.2}
h2{font-family:'DM Serif Display',serif;font-size:1.35rem;line-height:1.3}
h3{font-weight:600;font-size:.95rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .14s;font-family:'Inter',sans-serif;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover:not(:disabled){background:var(--navy-h)}
.btn-amber{background:var(--amber);color:var(--text)}.btn-amber:hover:not(:disabled){filter:brightness(.92)}
.btn-outline{background:transparent;color:var(--navy);border:2px solid var(--navy)}.btn-outline:hover{background:var(--bg)}
.btn-ghost{background:transparent;color:#fff;font-weight:500;border:1.5px solid rgba(255,255,255,.3)}.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:var(--red-lt);color:var(--red)}.btn-danger:hover{background:#f5c0bb}
.btn-sm{padding:5px 11px;font-size:.78rem}
.btn-full{width:100%;justify-content:center}
.btn-lg{padding:13px 26px;font-size:.97rem}
.btn-row{display:flex;gap:9px;flex-wrap:wrap}
.fg{margin-bottom:16px}
.fg label{display:block;font-weight:600;font-size:.83rem;margin-bottom:4px;color:var(--text)}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;font-family:'Inter',sans-serif;color:var(--text);background:#fff;outline:none;transition:border-color .14s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--navy)}
.fg textarea{resize:vertical;min-height:72px}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.home-grid-single{display:block}
@media(max-width:440px){.home-grid{grid-template-columns:1fr}}
.home-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--sh);padding:22px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .18s}
.home-card:hover:not(.disabled){border-color:var(--navy);transform:translateY(-2px);box-shadow:var(--sh-lg)}
.home-card.disabled{opacity:.6;cursor:not-allowed}
.home-card-icon{font-size:2rem;margin-bottom:9px}
.home-card p{font-size:.82rem;color:var(--muted);margin-top:4px}
.info-box{padding:10px 14px;border-radius:8px;font-size:.84rem;margin-bottom:13px}
.info-amber{background:var(--amber-lt);color:#7A4D00}
.warn{color:var(--red);font-size:.82rem;margin-top:6px;display:none}
.warn.show{display:block}
.answered-bar{position:sticky;top:58px;z-index:100;background:var(--navy);color:#fff;padding:8px 20px;font-size:.83rem;font-weight:600;text-align:center}
.q-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--sh);padding:18px 22px 16px;margin-bottom:10px;border:2px solid transparent;transition:border-color .2s,background .2s}
.q-card.highlight{border-color:var(--amber);background:var(--amber-lt)}
.q-num-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-num{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700;color:var(--muted)}
.q-badge{font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:4px}
.q-badge.tf{background:var(--amber-lt);color:#7A4D00}
.q-badge.mc{background:#EEF1FB;color:var(--navy)}
.q-text{font-size:.97rem;font-weight:500;margin-bottom:12px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:11px;padding:10px 14px;border:2px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;transition:all .13s;text-align:left;font-family:'Inter',sans-serif;font-size:.92rem;color:var(--text);width:100%}
.opt:hover{border-color:var(--navy-h);background:var(--bg)}
.opt.sel{border-color:var(--navy);background:#EEF1FB}
.opt.ok{border-color:var(--green);background:var(--green-lt)}
.opt.ng{border-color:var(--red);background:var(--red-lt)}
.bubble{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;color:var(--muted);transition:all .13s}
.opt.sel .bubble{background:var(--navy);border-color:var(--navy);color:#fff}
.opt.ok .bubble{background:var(--green);border-color:var(--green);color:#fff}
.opt.ng .bubble{background:var(--red);border-color:var(--red);color:#fff}
.ring-wrap{display:flex;flex-direction:column;align-items:center;margin:18px 0}
.ring{position:relative;width:148px;height:148px}
.ring svg{transform:rotate(-90deg)}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--navy);line-height:1}
.ring-sub{font-size:.7rem;color:var(--muted);font-weight:500}
.grade-badge{display:inline-block;font-family:'DM Serif Display',serif;font-size:1.8rem;padding:5px 20px;border-radius:8px;margin-top:9px}
.result-item{padding:12px 15px;border-radius:9px;margin-bottom:9px;border-left:4px solid}
.result-item.ok{background:var(--green-lt);border-color:var(--green)}
.result-item.ng{background:var(--red-lt);border-color:var(--red)}
.ri-head{display:flex;align-items:flex-start;gap:8px;font-weight:600;font-size:.88rem}
.ri-detail{font-size:.8rem;color:var(--muted);margin-top:4px;padding-left:22px}
.ri-icon{font-size:.95rem;flex-shrink:0;margin-top:1px}
.ed-tab-bar{display:flex;gap:0;margin-bottom:-1px;position:relative;z-index:1}
.ed-tab-btn{padding:9px 20px;border:1.5px solid var(--border);border-bottom:none;background:var(--bg);color:var(--muted);cursor:pointer;font-weight:600;font-size:.85rem;border-radius:var(--radius) var(--radius) 0 0;font-family:'Inter',sans-serif;transition:all .14s;margin-right:4px}
.ed-tab-btn.active{background:var(--surface);color:var(--navy)}
.ed-tab-btn:hover:not(.active){background:#e0e5f0}
.ed-tab-content{background:var(--surface);border-radius:0 var(--radius) var(--radius) var(--radius);box-shadow:var(--sh);border:1.5px solid var(--border);padding:24px}
.q-ed-row{border:1.5px solid var(--border);border-radius:8px;margin-bottom:7px;overflow:hidden}
.q-ed-hdr{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--bg);cursor:pointer;user-select:none}
.q-ed-hdr:hover{background:#e0e5f0}
.q-ed-body{padding:14px 16px;border-top:1.5px solid var(--border)}
.inst-row{display:flex;gap:9px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.inst-row input{padding:8px 11px;border:2px solid var(--border);border-radius:8px;font-size:.88rem;font-family:'Inter',sans-serif;color:var(--text);outline:none;flex:1;min-width:120px}
.inst-row input:focus{border-color:var(--navy)}
.mc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mc-row input[type=radio]{width:auto;cursor:pointer;accent-color:var(--navy)}
.mc-row .mc-lbl{font-size:.8rem;color:var(--muted);width:50px;flex-shrink:0}
.mc-row input[type=text]{flex:1;padding:6px 9px;border:1.5px solid var(--border);border-radius:6px;font-size:.85rem;font-family:'Inter',sans-serif;color:var(--text);outline:none}
.mc-row input[type=text]:focus{border-color:var(--navy)}
.tbadge{font-size:.67rem;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tbadge.mc{background:#EEF1FB;color:var(--navy)}.tbadge.tf{background:var(--amber-lt);color:#7A4D00}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease}
.email-note{font-size:.76rem;color:var(--muted);text-align:center;margin-top:5px}
.divider{height:1px;background:var(--border);margin:20px 0}
.gen-status{font-size:.83rem;margin-top:8px;min-height:18px}
.gen-status.ok{color:var(--green);font-weight:600}
.gen-status.err{color:var(--red);font-weight:600}
.q-scroll-list{max-height:400px;overflow-y:auto;border:1.5px solid var(--border);border-radius:8px;margin-top:12px}

</style>
</head>
<body>
<header class="hdr">
  <div class="logo">Commissioned School Security<br><span>Officer Exam</span></div>
  <div id="hdr-right"></div>
</header>
<div id="nav-area"></div>
<main id="app"></main>

function gradeFor(pct){
  if(pct>=90) return {l:'A',c:'#2D7A4F',bg:'#D1FAE5'};
  if(pct>=80) return {l:'B',c:'#1A5276',bg:'#D6EAF8'};
  if(pct>=70) return {l:'C',c:'#7A4D00',bg:'#FBE8C0'};
  if(pct>=60) return {l:'D',c:'#7D3C00',bg:'#FDEBD0'};
  return {l:'F',c:'#922B21',bg:'#FDECEA'};
}

const ADMIN_HASH = 'a019f6073a5e50f127c7cffb8ed1a977bd5209b5842e3e9484d4134cf5e13bbd';
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isAdminUnlocked(){ return sessionStorage.getItem('csso_admin')==='1'; }
function openEditor(){
  if(isAdminUnlocked()){ go('editor'); return; }
  go('adminlock');
}
async function tryAdminUnlock(){
  const val=document.getElementById('adminPw').value;
  const err=document.getElementById('adminErr');
  const hash=await sha256Hex(val);
  if(hash===ADMIN_HASH){
    sessionStorage.setItem('csso_admin','1');
    go('editor');
  } else {
    if(err) err.classList.add('show');
    document.getElementById('adminPw').value='';
    document.getElementById('adminPw').focus();
  }
}

  document.querySelectorAll('#opts_'+qId+' .opt').forEach((b,idx)=>{
    b.className='opt'+(idx===i?' sel':'');
    const bbl=b.querySelector('.bubble');
    if(bbl){ bbl.style.background=idx===i?'var(--navy)':''; bbl.style.borderColor=idx===i?'var(--navy)':''; bbl.style.color=idx===i?'#fff':''; }
  });
  const bar=document.getElementById('abar');
  if(bar) bar.textContent=numAnswered()+' of '+S.questions.length+' answered';
}
function finishTest(){
  const unanswered=S.questions.filter(q=>S.answers[q.id]===undefined);
  if(unanswered.length>0){
    unanswered.forEach(q=>{const c=document.getElementById('qc_'+q.id);if(c)c.classList.add('highlight');});
    const fw=document.getElementById('fw');
    if(fw){fw.textContent=unanswered.length+' question'+(unanswered.length!==1?'s':'')+' unanswered — please answer all questions before submitting.';fw.classList.add('show');}
    document.getElementById('qc_'+unanswered[0].id)?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  const correct=S.questions.filter(q=>S.answers[q.id]===q.correct).length;
  const total=S.questions.length;
  S.results={correct,total,pct:Math.round(correct/total*100),date:new Date().toLocaleString()};
  go('results');
}
function exitTest(){ if(confirm('Exit the exam? Your progress will be lost.')) goHome(); }

/* RESULTS */
function renderResults(){
  set('nav-area','<div class="nav-back"><button onclick="goHome()">← Home</button></div>');
  const {correct,total,pct,date}=S.results;
  const g=gradeFor(pct);
  const inst=S.instructors.find(i=>i.id===S.student.instId);
  const R=60,circ=+(2*Math.PI*R).toFixed(2),offset=+(circ*(1-pct/100)).toFixed(2);
  let breakdown='';
  S.questions.forEach((q,i)=>{
    const sa=S.answers[q.id],ok=sa===q.correct;
    breakdown+='<div class="result-item '+(ok?'ok':'ng')+'">' +
      '<div class="ri-head"><span class="ri-icon">'+(ok?'✅':'❌')+'</span><span>Q'+(i+1)+': '+esc(q.text)+'</span></div>' +
      '<div class="ri-detail">Your answer: <strong>'+esc(answerLabel(q,sa))+'</strong>'+ (!ok?' &nbsp;&middot;&nbsp; Correct: <strong>'+esc(answerLabel(q,q.correct))+'</strong>':'')+'</div>' +
      '</div>';
  });
  set('app',
    '<div class="wrap fade">' +
    '<div class="card" style="text-align:center;margin-bottom:13px">' +
    '<h2 style="margin-bottom:3px">Exam Complete!</h2>' +
    '<p style="color:var(--muted);font-size:.83rem">'+esc(S.student.name)+' &nbsp;&middot;&nbsp; '+date+'</p>' +
    '<div class="ring-wrap"><div class="ring">' +
    '<svg width="148" height="148" viewBox="0 0 148 148" aria-hidden="true">' +
    '<circle cx="74" cy="74" r="'+R+'" fill="none" stroke="var(--border)" stroke-width="11"/>' +
    '<circle id="rf" cx="74" cy="74" r="'+R+'" fill="none" stroke="'+g.c+'" stroke-width="11" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" stroke-linecap="round" style="transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)"/>' +
    '</svg>' +
    '<div class="ring-text"><div class="ring-pct">'+pct+'%</div><div class="ring-sub">'+correct+'/'+total+' correct</div></div>' +
    '</div><div class="grade-badge" style="color:'+g.c+';background:'+g.bg+'">Grade: '+g.l+'</div></div>' +
    '<div class="btn-row" style="justify-content:center;margin-bottom:6px">' +
    '<button class="btn btn-primary btn-lg" id="sendBtn" onclick="sendEmail()">✉️ Email My Results</button>' +
    '<button class="btn btn-outline btn-lg" onclick="makePDF()">⬇ Download PDF</button>' +
    '</div>' +
    '<div id="sendStatus" class="gen-status" style="text-align:center"></div>' +
    (inst?'<p style="font-size:.76rem;color:var(--muted);margin-top:4px">Sends to: <strong>'+esc(inst.name)+'</strong> &nbsp;&middot;&nbsp; CC\'d to you</p>':'') +
    '</div>' +
    '<h3 style="margin-bottom:9px;padding:0 2px">Question Breakdown</h3>' +
    breakdown + '</div>'
  );
  setTimeout(()=>{const el=document.getElementById('rf');if(el)el.style.strokeDashoffset=offset;},80);
  // Auto-send the moment results appear — no extra tap needed
  setTimeout(()=>{ sendEmail(); }, 300);
}

/* PDF */
function makePDF(){
  const {jsPDF}=window.jspdf;
  if(!jsPDF){alert('PDF library not loaded. Check your internet connection.');return;}
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const {correct,total,pct,date}=S.results;
  const g=gradeFor(pct);
  const inst=S.instructors.find(i=>i.id===S.student.instId);
  const W=210,M=20;let y=0;
  doc.setFillColor(44,62,122);doc.rect(0,0,W,30,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text('Commissioned School Security Officer Exam',W/2,12,{align:'center'});
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);
  doc.text('Assessment Results',W/2,21,{align:'center'});
  y=40;doc.setTextColor(26,31,54);
  doc.setFillColor(240,243,252);doc.roundedRect(M,y-4,W-M*2,33,2,2,'F');
  [['Student:',S.student.name],['Email:',S.student.email],['Instructor:',inst?inst.name:'—'],['Date:',date]].forEach((r,i)=>{
    const ry=y+4+i*7;
    doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.text(r[0],M+4,ry);
    doc.setFont('helvetica','normal');doc.text(String(r[1]),M+25,ry);
  });
  y+=41;
  doc.setFillColor(238,241,251);doc.roundedRect(M,y-4,W-M*2,16,2,2,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(12);
  doc.text('Score: '+correct+'/'+total+'  ('+pct+'%)   Grade: '+g.l,W/2,y+5,{align:'center'});
  y+=24;
  S.questions.forEach((q,i)=>{
    if(y>265){doc.addPage();y=20;}
    const sa=S.answers[q.id],ok=sa===q.correct;
    if(ok)doc.setTextColor(45,122,79);else doc.setTextColor(192,57,43);
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.text(ok?'PASS':'FAIL',M,y);
    doc.setTextColor(26,31,54);
    const qLines=doc.splitTextToSize('Q'+(i+1)+': '+q.text,W-M*2-18);
    doc.text(qLines,M+15,y);y+=qLines.length*5+2;
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(107,114,128);
    doc.text('Your answer: '+answerLabel(q,sa),M+15,y);
    if(!ok){doc.setTextColor(192,57,43);doc.text('Correct: '+answerLabel(q,q.correct),M+15,y+5);y+=5;}
    y+=9;
  });
  doc.setFontSize(7);doc.setTextColor(180,180,180);
  doc.text('CSSO Exam Results  ·  '+new Date().toISOString(),W/2,289,{align:'center'});
  doc.save(S.student.name.replace(/\s+/g,'_')+'_CSSO_Exam_Results.pdf');
}

/* EMAIL — sent via EmailJS, no mail client required on the device */
function buildBreakdownText(){
  const {correct,total,pct,date}=S.results, g=gradeFor(pct);
  const inst=S.instructors.find(i=>i.id===S.student.instId);
  let body='QUESTION BREAKDOWN\n'+'─'.repeat(42)+'\n';
  S.questions.forEach((q,i)=>{
    const sa=S.answers[q.id],ok=sa===q.correct;
    body+='\n['+(ok?'PASS':'FAIL')+'] Q'+(i+1)+': '+q.text+'\n  Your answer: '+answerLabel(q,sa)+'\n';
    if(!ok) body+='  Correct: '+answerLabel(q,q.correct)+'\n';
  });
  return body;
}

function emailjsConfigured(){
  return !!(S.emailjs.publicKey && S.emailjs.serviceId && S.emailjs.templateId);
}

async function sendEmail(){
  const statusEl=document.getElementById('sendStatus');
  const btn=document.getElementById('sendBtn');

  if(!emailjsConfigured()){
    if(statusEl){
      statusEl.className='gen-status err';
      statusEl.textContent='Email sending is not configured yet. An administrator needs to add EmailJS keys in Edit & Setup → Settings.';
    }
    return;
  }

  const {correct,total,pct,date}=S.results, g=gradeFor(pct);
  const inst=S.instructors.find(i=>i.id===S.student.instId);
  if(!inst){
    if(statusEl){statusEl.className='gen-status err';statusEl.textContent='No instructor on file for this submission.';}
    return;
  }

  if(btn){btn.disabled=true;btn.textContent='✉️ Sending…';}
  if(statusEl){statusEl.className='gen-status';statusEl.textContent='Sending your results…';}

  try{
    emailjs.init({publicKey:S.emailjs.publicKey});
    const params={
      to_email: inst.email,
      cc_email: S.student.email,
      student_name: S.student.name,
      instructor_name: inst.name,
      exam_title: S.title,
      score_line: correct+' / '+total+'  ('+pct+'%)  —  Grade: '+g.l,
      date: date,
      breakdown: buildBreakdownText(),
    };
    await emailjs.send(S.emailjs.serviceId, S.emailjs.templateId, params);
    if(statusEl){
      statusEl.className='gen-status ok';
      statusEl.textContent='✅ Results sent to '+inst.name+' and a copy to you at '+S.student.email+'.';
    }
    if(btn){btn.textContent='✓ Sent';}
  }catch(err){
    if(statusEl){
      statusEl.className='gen-status err';
      statusEl.textContent='Could not send automatically (the connection may have dropped). Please use Download PDF and email it manually, or try again.';
    }
    if(btn){btn.disabled=false;btn.textContent='✉️ Email My Results';}
    console.error('EmailJS error:', err);
  }
}

/* EDITOR */
function renderEditor(){
  if(!isAdminUnlocked()){ go('adminlock'); return; }
  set('nav-area','<div class="nav-back-w"><button onclick="saveExit()">← Save &amp; Exit</button></div>');
  set('hdr-right','<button class="btn btn-ghost btn-sm" onclick="saveAll()">💾 Save</button>');
  const tabDefs=[
    {id:'questions',label:'📋 Questions ('+S.questions.length+')'},
    {id:'instructors',label:'👥 Instructors'},
    {id:'settings',label:'⚙️ Settings'}
  ];
  const tabHtml=tabDefs.map(t=>'<button class="ed-tab-btn'+(S.edTab===t.id?' active':'')+'" data-tab="'+t.id+'" onclick="switchTab(this.dataset.tab)">'+t.label+'</button>').join('');
  set('app','<div class="wrap-wide fade"><div class="ed-tab-bar">'+tabHtml+'</div><div class="ed-tab-content" id="ed-body"></div></div>');
  renderEdBody();
}
function switchTab(tab){
  S.edTab=tab;
  document.querySelectorAll('.ed-tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  renderEdBody();
}
function renderEdBody(){
  const b=document.getElementById('ed-body');
  if(!b) return;
  if(S.edTab==='questions')        b.innerHTML=buildQuestionsTab();
  else if(S.edTab==='instructors') b.innerHTML=buildInstructorsTab();
  else b.innerHTML=buildSettingsTab();
}

function buildQuestionsTab(){
  const tfCount=S.questions.filter(q=>isTF(q)).length;
  const mcCount=S.questions.length-tfCount;
  let qRows='';
  S.questions.forEach((q,qi)=>{
    qRows+='<div class="q-ed-row" id="qer_'+q.id+'">' +
      '<div class="q-ed-hdr" data-qid="'+q.id+'" onclick="toggleQRow(this.dataset.qid)">' +
      '<span class="tbadge '+(isTF(q)?'tf':'mc')+'">'+(isTF(q)?'T/F':'MC')+'</span>' +
      '<span style="flex:1;font-size:.83rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" id="qpv_'+q.id+'">Q'+(qi+1)+': '+esc(q.text)+'</span>' +
      '<button class="btn btn-danger btn-sm" style="padding:2px 7px;font-size:.72rem" data-qi="'+qi+'" onclick="event.stopPropagation();deleteQ(+this.dataset.qi)">✕</button>' +
      '<span style="color:var(--muted);font-size:.78rem;margin-left:3px" id="qarr_'+q.id+'">▼</span>' +
      '</div>' +
      '<div class="q-ed-body" style="display:none" id="qbd_'+q.id+'">'+buildQEdBody(q,qi)+'</div>' +
      '</div>';
  });
  return '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">' +
    '<div><h3 style="margin-bottom:3px">'+S.questions.length+' Questions</h3>' +
    '<p style="font-size:.83rem;color:var(--muted)">'+tfCount+' True/False &nbsp;&middot;&nbsp; '+mcCount+' Multiple Choice</p></div>' +
    '<div class="btn-row">' +
    '<button class="btn btn-outline btn-sm" onclick="addManualQ()">+ Add Question</button>' +
    '<button class="btn btn-danger btn-sm" onclick="resetToBank()">↺ Reset to Original 120</button>' +
    '</div></div>' +
    '<div class="q-scroll-list">'+qRows+'</div>';
}

function buildQEdBody(q,qi){
  let opts='';
  if(isTF(q)){
    opts='<div class="mc-row"><input type="radio" name="cr_'+q.id+'" '+(q.correct===0?'checked':'')+' onchange="S.questions['+qi+'].correct=0"><span class="mc-lbl">True</span></div>' +
         '<div class="mc-row"><input type="radio" name="cr_'+q.id+'" '+(q.correct===1?'checked':'')+' onchange="S.questions['+qi+'].correct=1"><span class="mc-lbl">False</span></div>';
  } else {
    q.options.forEach((o,i)=>{
      opts+='<div class="mc-row">' +
        '<input type="radio" name="cr_'+q.id+'" '+(q.correct===i?'checked':'')+' onchange="S.questions['+qi+'].correct='+i+'">' +
        '<span class="mc-lbl">'+LTRS[i]+'</span>' +
        '<input type="text" value="'+esc(o)+'" oninput="S.questions['+qi+'].options['+i+']=this.value">' +
        '</div>';
    });
  }
  return '<div class="fg" style="margin-top:8px"><label>Question Text</label>' +
    '<textarea oninput="S.questions['+qi+'].text=this.value;updatePreview(\''+q.id+'\',\'Q'+(qi+1)+': \'+this.value)" style="min-height:56px">'+esc(q.text)+'</textarea></div>' +
    '<div class="fg"><label>'+(isTF(q)?'Correct Answer':'Answer Options — radio marks the correct answer')+'</label>'+opts+'</div>';
}

function toggleQRow(id){
  const body=document.getElementById('qbd_'+id),arr=document.getElementById('qarr_'+id);
  if(!body) return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  if(arr) arr.textContent=open?'▲':'▼';
}
function updatePreview(id,val){const el=document.getElementById('qpv_'+id);if(el)el.textContent=val||'(empty)';}
function deleteQ(qi){if(!confirm('Delete this question?')) return;S.questions.splice(qi,1);renderEdBody();}
function addManualQ(){
  S.questions.push({id:uid(),type:'mc',text:'',options:['','','',''],correct:0});
  renderEdBody();
  setTimeout(()=>{const rows=document.querySelectorAll('.q-scroll-list .q-ed-row');if(rows.length)rows[rows.length-1].scrollIntoView({behavior:'smooth'});},80);
}
function resetToBank(){
  if(!confirm('Reset all questions to the original 120 from the PDF? Any custom edits will be lost.')) return;
  S.questions=QUESTION_BANK.map(q=>({...q}));
  saveData();renderEdBody();
}

function buildInstructorsTab(){
  let rows='';
  if(S.instructors.length){
    S.instructors.forEach((inst,i)=>{
      rows+='<div class="inst-row">' +
        '<input type="text" value="'+esc(inst.name)+'" placeholder="Instructor Name" data-i="'+i+'" oninput="S.instructors[+this.dataset.i].name=this.value">' +
        '<input type="email" value="'+esc(inst.email)+'" placeholder="instructor@school.edu" data-i="'+i+'" oninput="S.instructors[+this.dataset.i].email=this.value" style="flex:1.4">' +
        '<button class="btn btn-danger btn-sm" data-i="'+i+'" onclick="removeInst(+this.dataset.i)">Remove</button>' +
        '</div>';
    });
  } else {
    rows='<p style="color:var(--muted);font-size:.88rem;padding:8px 0">No instructors yet. Click Add Instructor below.</p>';
  }
  return '<h3 style="margin-bottom:5px">Instructor Roster</h3>' +
    '<p style="color:var(--muted);font-size:.84rem;margin-bottom:18px">Students select their instructor when starting the exam. Results are emailed to the selected instructor.</p>' +
    '<div id="instList">'+rows+'</div>' +
    '<button class="btn btn-outline" style="margin-top:12px" onclick="addInst()">+ Add Instructor</button>';
}
function addInst(){S.instructors.push({id:uid(),name:'',email:''});renderEdBody();}
function removeInst(i){if(!confirm('Remove this instructor?')) return;S.instructors.splice(i,1);renderEdBody();}

function buildSettingsTab(){
  const ej=S.emailjs;
  const statusBadge = emailjsConfigured()
    ? '<span style="color:var(--green);font-weight:600;font-size:.8rem">✓ Configured</span>'
    : '<span style="color:var(--red);font-weight:600;font-size:.8rem">⚠ Not configured — emailing results will not work</span>';
  return '<h3 style="margin-bottom:14px">General Settings</h3>' +
    '<div class="fg"><label>Exam Title</label>' +
    '<input type="text" id="cfgTitle" value="'+esc(S.title)+'" oninput="S.title=this.value"></div>' +
    '<div class="divider"></div>' +
    '<h3 style="margin-bottom:5px">Email Delivery (EmailJS)</h3>' +
    '<p style="font-size:.83rem;color:var(--muted);margin-bottom:10px">Results are sent automatically via <a href="https://www.emailjs.com" target="_blank" style="color:var(--navy);font-weight:600">EmailJS</a> — no mail app needed on the student\'s device. Paste in the 3 values from your EmailJS account below.</p>' +
    '<p style="margin-bottom:14px">'+statusBadge+'</p>' +
    '<div class="fg"><label>Public Key</label>' +
    '<input type="text" id="ejPublicKey" value="'+esc(ej.publicKey)+'" placeholder="e.g. AbCdEfGhIjKlMnOp" oninput="S.emailjs.publicKey=this.value"></div>' +
    '<div class="fg"><label>Service ID</label>' +
    '<input type="text" id="ejServiceId" value="'+esc(ej.serviceId)+'" placeholder="e.g. service_abc1234" oninput="S.emailjs.serviceId=this.value"></div>' +
    '<div class="fg"><label>Template ID</label>' +
    '<input type="text" id="ejTemplateId" value="'+esc(ej.templateId)+'" placeholder="e.g. template_xyz5678" oninput="S.emailjs.templateId=this.value"></div>' +
    '<p style="font-size:.78rem;color:var(--muted)">Find these under <strong>Account → General</strong> (Public Key) and <strong>Email Services</strong> / <strong>Email Templates</strong> in your EmailJS dashboard.</p>';
}

function saveAll(){
  saveData();
  const btn=document.querySelector('#hdr-right .btn');
  if(btn){const o=btn.innerHTML;btn.innerHTML='✓ Saved';setTimeout(()=>btn.innerHTML=o,1500);}
}
function saveExit(){saveData();goHome();}

loadData();
render();

</script>
